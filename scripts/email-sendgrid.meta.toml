version = 1

name = "email-sendgrid"
description = "Send an email via SendGrid API"

risk = "medium"

[required_secrets]
SENDGRID_API_KEY = "SendGrid API key"

[required_parameters]
to = { type = "string", description = "Recipient email address" }
subject = { type = "string", description = "Email subject line (max 200 chars)" }
body = { type = "string", description = "Email body content" }

[optional_parameters]
from = { type = "string", default = "agent@example.com", description = "Sender email" }

[approval]
required = true
reason = "Outbound communication"

[resource_limits]
cpu_quota = 0.5
memory_mb = 128
network_egress = true
timeout_seconds = 30
